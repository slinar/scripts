name: Test OpenSSH Script

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'openssh.sh'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'openssh.sh'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - centos:6
          - centos:7
          - rockylinux:8
          - rockylinux:9
          - rockylinux:10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Script and Check Exit Code
        run: |          
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.os }} \
            /bin/bash -c "chmod +x ./openssh.sh && ./openssh.sh"
